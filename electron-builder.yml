appId: com.qa-auto-hardware.app
productName: QA Auto Hardware
copyright: Copyright © 2024 QA Auto Hardware Team

directories:
  output: release/${version}

files:
  - dist/**/*
  - dist-electron/**/*

# Include Python OCR scripts
extraResources:
  - from: python
    to: python
    filter:
      - "**/*.py"
      - "**/*.txt"

extraMetadata:
  main: dist-electron/main.js

# macOS configuration
mac:
  category: public.app-category.utilities
  # Skip code signing
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows configuration
win:
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Skip code signing
  signingHashAlgorithms: []
  sign: null
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: QA Auto Hardware

# Linux configuration
linux:
  category: Utility
  maintainer: QA Auto Hardware Team
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
